name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release --disable-sandbox

      - name: Package binary
        run: |
          mkdir -p dist
          cp .build/release/dooray-cli dist/dooray-cli
          cd dist && tar -czf dooray-cli-arm64-macos.tar.gz dooray-cli

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 dist/dooray-cli-arm64-macos.tar.gz | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dooray-cli-arm64-macos.tar.gz

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/sunghyun-k/homebrew-tap.git" homebrew-tap
          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/dooray-cli.rb <<EOF
          class DoorayCli < Formula
            desc "Dooray project management CLI"
            homepage "https://github.com/sunghyun-k/dooray-cli"
            url "https://github.com/sunghyun-k/dooray-cli/releases/download/${VERSION}/dooray-cli-arm64-macos.tar.gz"
            sha256 "${SHA256}"
            license "MIT"

            depends_on :macos

            def install
              bin.install "dooray-cli"
            end
          end
          EOF
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dooray-cli.rb
          git diff --staged --quiet || (git commit -m "Update dooray-cli to ${VERSION}" && git push)
